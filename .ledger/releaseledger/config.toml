config_version = 2
# Branch-scoped release state. This block is safe to commit.
ledger_ref = "main"
ledger_parent_ref = ""
ledger_branch_guard = "off"
# Cross-ledger identity. Local record IDs stay unchanged.

[ledger]
code = "rl"
# Release defaults.

[release]
default_changelog = "CHANGELOG.md"
default_status = "planned"
allow_dirty_worktree = true
# Changelog build defaults.

[changelog]
output = "CHANGELOG.md"
header = ""
body = """## [{{ release.version }}] - {% if release.date %}{{ release.date }}{% else %}Unreleased{% endif %}{% if release.yanked %} [YANKED]{% endif %}

{% for group in groups %}
### {{ group.title }}
{% for entry in group.entries %}
- {% if entry.breaking %}**BREAKING:** {% endif %}{{ entry.summary }}
{% endfor %}

{% endfor %}
"""
footer = "<!-- generated by releaseledger -->"
trim = true
render_always = false
postprocessors = []
standard = "keepachangelog-1.1.0"
group_mode = "extended"
link_references = true
repository_url = ""
tag_prefix = "v"
compare_url_template = ""
release_url_template = ""
preamble = ""
semver = true
unreleased = true
# Git-first release evidence.

[git]
enabled = true
default_base = "previous_release_tag"
default_head = "HEAD"
previous_tag_patterns = ["v{version}", "{version}"]
include_merges = "nontrivial"
require_clean_worktree = false
max_commits = 500
max_diff_chars_per_commit = 12000
candidate_status = "draft"
